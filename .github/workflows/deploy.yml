name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Prepare deploy directory
        run: |
          mkdir -p _site/public _site/css _site/img
          cp src/client/index.html _site/
          cp src/client/public/bundle.js _site/public/
          cp -r src/client/css/. _site/css/
          cp -r src/client/img/. _site/img/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
